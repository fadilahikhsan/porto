<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0ea5a4"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#050812"/>
  <g opacity="0.12">
    <circle cx="980" cy="120" r="220" fill="url(#g1)" filter="url(#blur)"/>
    <circle cx="160" cy="560" r="200" fill="#8b5cf6" filter="url(#blur)"/>
  </g>
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="1040" height="480" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <g transform="translate(48,40)">
      <text x="0" y="40" font-family="'Inter',sans-serif" font-size="44" fill="#cfeefe" font-weight="700">Labaku</text>
      <text x="0" y="86" font-family="'Inter',sans-serif" font-size="20" fill="#97a6b2">Financial Toolkit · UMKM</text>

      <!-- dashboard mock -->
      <rect x="0" y="120" width="640" height="260" rx="12" fill="#061026" stroke="rgba(255,255,255,0.03)"/>
      <rect x="660" y="120" width="312" height="120" rx="10" fill="#061026" stroke="rgba(255,255,255,0.03)"/>
      <rect x="660" y="252" width="312" height="128" rx="10" fill="#061026" stroke="rgba(255,255,255,0.03)"/>

      <!-- small charts -->
      <g fill="#0ea5a4" transform="translate(24,156)">
        <rect x="0" y="120" width="18" height="40" rx="4"/>
        <rect x="30" y="80" width="18" height="80" rx="4"/>
        <rect x="60" y="20" width="18" height="140" rx="4"/>
        <rect x="90" y="60" width="18" height="100" rx="4"/>
        <rect x="120" y="40" width="18" height="120" rx="4"/>
      </g>

      <!-- wallet card -->
      <g transform="translate(680,150)">
        <rect x="12" y="12" width="288" height="96" rx="8" fill="url(#g1)" opacity="0.12"/>
        <text x="28" y="46" font-family="'Inter',sans-serif" font-size="16" fill="#cfeefe">Saldo Saat Ini</text>
        <text x="28" y="80" font-family="'Inter',sans-serif" font-size="28" fill="#ffffff" font-weight="700">Rp 12.450.000</text>
      </g>

    </g>
  </g>
</svg>